<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App 2 - Sets | Libros</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #34495e, #1a252f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 0.3rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 0.7rem; justify-content: center; margin-bottom: 1.5rem; }
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary { background: #2c3e50; color: #fff; }
        .btn-primary:hover { background: #34495e; transform: translateY(-2px); }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #2ecc71; transform: translateY(-2px); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; transform: translateY(-2px); }
        .btn-info { background: #2980b9; color: #fff; }
        .btn-info:hover { background: #3498db; transform: translateY(-2px); }
        .output-box {
            background: #1e1e2e;
            color: #f1c40f;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            min-height: 80px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .input-group { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .input-group input {
            padding: 0.5rem 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            flex: 1;
            max-width: 250px;
        }
        .input-group input:focus { outline: none; border-color: #2c3e50; }
        .back-link { display: block; text-align: center; margin-top: 1.2rem; color: #2c3e50; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>App 2 - Sets</h1>
        <p class="subtitle">Colección de libros (valores únicos)</p>

        <div class="input-group">
            <input type="text" id="libroInput" placeholder="Nombre del libro" />
            <button class="btn btn-success" onclick="agregarLibro()">Añadir</button>
            <button class="btn btn-danger" onclick="eliminarLibro()">Eliminar</button>
        </div>

        <div class="btn-group">
            <button class="btn btn-info" onclick="imprimirSet()">Imprimir Set</button>
        </div>

        <div class="output-box" id="output">
            Set: { "Cien años de soledad", "Don Quijote", "Rayuela", "El principito", "1984" }
        </div>

        <a href="../index.html" class="back-link">Volver al inicio</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
