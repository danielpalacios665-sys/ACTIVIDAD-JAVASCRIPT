<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App 4 - Transformación</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1b4332, #2d6a4f, #40916c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #1b4332; text-align: center; margin-bottom: 0.3rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 0.7rem; justify-content: center; margin-bottom: 1.5rem; }
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary { background: #1b4332; color: #fff; }
        .btn-primary:hover { background: #2d6a4f; transform: translateY(-2px); }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #2ecc71; transform: translateY(-2px); }
        .btn-warning { background: #e67e22; color: #fff; }
        .btn-warning:hover { background: #d35400; transform: translateY(-2px); }
        .btn-info { background: #2980b9; color: #fff; }
        .btn-info:hover { background: #3498db; transform: translateY(-2px); }
        .output-box {
            background: #1e1e2e;
            color: #a8e6cf;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            min-height: 100px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 0.5rem;
        }
        .badge-array { background: #3498db; color: #fff; }
        .badge-set { background: #e67e22; color: #fff; }
        .badge-map { background: #27ae60; color: #fff; }
        .back-link { display: block; text-align: center; margin-top: 1.2rem; color: #1b4332; font-weight: 600; }
        .status-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .status-item {
            padding: 0.3rem 1rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 App 4 · Transformación</h1>
        <p class="subtitle">Array ⇾ Set ⇾ Map</p>

        <div class="status-bar" id="statusBar">
            <span class="status-item" style="background:#d4edda;color:#155724;">📦 Array activo</span>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="transformarASet()">📦 ➝ 🎯 Array → Set</button>
            <button class="btn btn-success" onclick="transformarAMap()">🎯 ➝ 🗺️ Set → Map</button>
            <button class="btn btn-info" onclick="imprimirMap()">📋 Imprimir Map</button>
        </div>

        <div class="output-box" id="output">
Array original: [ "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Lunes", "Sábado" ]
        </div>

        <a href="../index.html" class="back-link">← Volver al inicio</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
